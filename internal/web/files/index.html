<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MC Sinc</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #1a1d24;
      --border: #2a2e38;
      --text: #e6e8eb;
      --muted: #8b909c;
      --accent: #4ea1ff;
      --ok: #4ade80;
      --warn: #fbbf24;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    header h1 { margin: 0; font-size: 1.4rem; }
    header h1 small { color: var(--muted); font-weight: normal; margin-left: .5rem; }
    .header-right { display: flex; align-items: center; gap: 1rem; }
    #lang-select {
      background: var(--bg); color: var(--text);
      border: 1px solid var(--border);
      padding: .25rem .5rem; border-radius: 4px;
      font-size: .85rem; cursor: pointer;
    }
    main { max-width: 960px; margin: 0 auto; padding: 2rem; display: grid; gap: 1.5rem; }
    section.panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
    }
    section.panel h2 { margin-top: 0; font-size: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .section-header { display: flex; justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: .5rem; }
    .section-header h2 { margin: 0; }
    .section-actions { display: flex; gap: .35rem; }
    button.ghost {
      background: transparent; color: var(--text); border: 1px solid var(--border);
      padding: .3rem .7rem; font-size: .8rem;
    }
    button.ghost.danger { color: var(--danger); border-color: rgba(248,113,113,.3); }
    button.ghost.muted { color: var(--muted); }
    button.ghost:hover:not(:disabled) { background: rgba(255,255,255,.04); }
    button.reject-btn {
      background: transparent; color: var(--danger);
      border: 1px solid rgba(248,113,113,.3);
      padding: .5rem 1rem; border-radius: 6px; cursor: pointer; font-size: .9rem;
      margin-left: .35rem;
    }
    button.reject-btn:hover:not(:disabled) { background: rgba(248,113,113,.1); }
    button.primary { background: var(--accent); color: #fff; border: 0; padding: .5rem 1rem; border-radius: 6px; cursor: pointer; font-size: .9rem; }
    button.primary:disabled { opacity: .4; cursor: not-allowed; }
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      display: flex; align-items: center; justify-content: center; z-index: 50;
    }
    .modal-content {
      background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
      width: min(640px, 92vw); max-height: 80vh; display: flex; flex-direction: column;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: .8rem 1rem; border-bottom: 1px solid var(--border); }
    .modal-header h3 { margin: 0; font-size: 1rem; }
    .modal-breadcrumb { padding: .5rem 1rem; font-family: ui-monospace, Menlo, monospace; font-size: .85rem; color: var(--muted); border-bottom: 1px solid var(--border); word-break: break-all; }
    .modal-list { padding: .25rem 0; overflow-y: auto; flex: 1; }
    .modal-list .item {
      padding: .55rem 1rem; cursor: pointer; display: flex; gap: .5rem; align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .modal-list .item:last-child { border-bottom: none; }
    .modal-list .item:hover { background: rgba(255,255,255,.04); }
    .modal-list .item.parent { color: var(--muted); }
    .modal-list .item.avid { color: var(--accent); font-weight: 600; }
    .modal-list .item .name { flex: 1; }
    .modal-list .item .marker { font-size: .7rem; color: var(--muted); }
    .modal-footer { display: flex; justify-content: space-between; align-items: center; padding: .8rem 1rem; border-top: 1px solid var(--border); gap: 1rem; }
    .browse-status { font-size: .85rem; color: var(--muted); flex: 1; }
    .browse-status.error { color: var(--danger); }
    .browse-status.ok { color: var(--ok); }
    .modal-actions { display: flex; gap: .5rem; }
    .restart-warn {
      margin-top: .75rem; padding: .6rem .8rem;
      background: rgba(251, 191, 36, .12);
      border: 1px solid rgba(251, 191, 36, .35);
      border-radius: 6px; color: var(--warn); font-size: .9rem;
    }
    #root-edit-btn { margin-left: .5rem; font-size: .75rem; padding: .15rem .5rem; }
    .status-grid { display: grid; grid-template-columns: max-content 1fr; gap: .25rem 1rem; font-size: .95rem; }
    .status-grid dt { color: var(--muted); }
    ul.files { list-style: none; padding: 0; margin: 0; }
    ul.files li {
      padding: .6rem 0;
      border-bottom: 1px solid var(--border);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: .85rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    ul.files li:last-child { border-bottom: none; }
    ul.files li .path { flex: 1; }
    ul.files li .size { color: var(--muted); }
    ul.files li.no-hash { opacity: .55; }
    ul.files li.no-hash .hash-note { color: var(--muted); font-style: italic; }
    .empty { color: var(--muted); font-style: italic; }
    button {
      background: var(--accent); color: #fff; border: 0; padding: .5rem 1rem;
      border-radius: 6px; cursor: pointer; font-size: .9rem;
    }
    button:hover:not(:disabled) { filter: brightness(1.1); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    input[type=text] {
      background: var(--bg); color: var(--text); border: 1px solid var(--border);
      padding: .5rem .75rem; border-radius: 6px; flex: 1; font-size: .9rem;
    }
    .commit-form { display: flex; gap: .5rem; margin-top: 1rem; }

    /* Cards de commit (sent + received) */
    .commit-list { display: grid; gap: .75rem; }
    .commit-card {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .9rem 1rem;
      background: var(--bg);
    }
    .commit-card header.row {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 1rem; padding: 0; border: 0; margin-bottom: .35rem;
    }
    .commit-card .meta {
      color: var(--muted); font-size: .8rem;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
    .commit-card .msg { font-size: .95rem; margin: .15rem 0 .5rem; }
    .commit-card .summary {
      display: flex; justify-content: space-between; align-items: center;
      gap: 1rem; font-size: .85rem; color: var(--muted);
    }
    .commit-card .summary .actions { display: flex; gap: .5rem; align-items: center; }
    .commit-card .toggle {
      background: transparent; color: var(--accent); padding: 0;
      font-size: .85rem; text-decoration: underline; cursor: pointer;
    }
    .commit-card .toggle:hover { filter: brightness(1.2); }
    .commit-card details { margin-top: .5rem; }
    .commit-card details summary {
      color: var(--accent); cursor: pointer; font-size: .85rem;
      list-style: none; user-select: none;
    }
    .commit-card details summary::-webkit-details-marker { display: none; }
    .commit-card details summary::before { content: '▸ '; }
    .commit-card details[open] summary::before { content: '▾ '; }
    .commit-card details ul.files { margin-top: .4rem; }

    /* Badges de status */
    .badge {
      display: inline-block; padding: .15rem .55rem;
      border-radius: 999px; font-size: .72rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .badge.announced { background: #2a2e38; color: var(--muted); }
    .badge.pulling   { background: rgba(251,191,36,.15); color: var(--warn); }
    .badge.pulled    { background: rgba(74,222,128,.15); color: var(--ok); }
    .badge.failed    { background: rgba(248,113,113,.15); color: var(--danger); }

    /* Avid state — cores diferentes por estado */
    .badge.busy            { background: rgba(248,113,113,.15); color: var(--danger); }
    .badge.open_idle       { background: rgba(251,191,36,.15); color: var(--warn); }
    .badge.recently_closed { background: #2a2e38; color: var(--muted); }
    .badge.idle            { background: rgba(74,222,128,.15); color: var(--ok); }
    .badge.unknown         { background: #2a2e38; color: var(--muted); }
    .badge.disconnected    { background: rgba(248, 113, 113, .15); color: var(--danger); }
    .badge.rejected        { background: rgba(139, 144, 156, .15); color: var(--muted); }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }
    .badge.pulling { animation: pulse 1.6s ease-in-out infinite; }
    .badge.busy    { animation: pulse 1.6s ease-in-out infinite; }

    /* Commits enviados ficam mais compactos */
    .commit-card.sent { padding: .65rem 1rem; }
    .commit-card.sent .msg { margin: 0; font-size: .9rem; }
  </style>
</head>
<body>
  <header>
    <h1>MC Sinc <small id="version"></small></h1>
    <span class="header-right">
      <span id="connection-badge" class="badge disconnected" hidden></span>
      <select id="lang-select" hidden></select>
      <span id="user-badge" class="empty"></span>
    </span>
  </header>

  <main>
    <section class="panel">
      <h2 id="title-status"></h2>
      <dl class="status-grid">
        <dt id="label-user"></dt><dd id="user">—</dd>
        <dt id="label-root"></dt>
        <dd>
          <span id="root">—</span>
          <button id="root-edit-btn" class="ghost muted" hidden></button>
        </dd>
        <dt id="label-connected"></dt><dd id="peers">—</dd>
        <dt id="label-avid"></dt><dd id="avid">—</dd>
      </dl>
      <div id="restart-warn" class="restart-warn" hidden></div>
    </section>

    <div id="browse-modal" class="modal" hidden>
      <div class="modal-content">
        <header class="modal-header">
          <h3 id="browse-title"></h3>
          <button id="browse-close" class="ghost">×</button>
        </header>
        <div class="modal-breadcrumb" id="browse-breadcrumb"></div>
        <div class="modal-list" id="browse-list"></div>
        <footer class="modal-footer">
          <span id="browse-status" class="browse-status"></span>
          <span class="modal-actions">
            <button id="browse-select" class="primary" disabled></button>
            <button id="browse-cancel" class="ghost"></button>
          </span>
        </footer>
      </div>
    </div>

    <section class="panel">
      <h2 id="title-pending"></h2>
      <ul class="files" id="pending"><li class="empty"></li></ul>
      <div class="commit-form">
        <input type="text" id="message" />
        <button id="commit-btn" disabled></button>
      </div>
    </section>

    <section class="panel">
      <div class="section-header">
        <h2 id="title-received"></h2>
        <span class="section-actions">
          <button id="receive-all-btn" class="ghost" hidden></button>
          <button id="reject-all-btn" class="ghost danger" hidden></button>
          <button id="clear-history-btn" class="ghost muted" hidden></button>
        </span>
      </div>
      <div class="commit-list" id="received"><div class="empty"></div></div>
    </section>

    <section class="panel">
      <h2 id="title-sent"></h2>
      <div class="commit-list" id="sent"><div class="empty"></div></div>
    </section>
  </main>

  <script>
    // ===========================================================================
    // i18n — strings centralizadas por idioma.
    //
    // Padrão: adicionar uma língua nova é só apender uma chave em STRINGS com a
    // mesma forma. O seletor no header aparece automaticamente quando há 2+
    // entradas. Idioma persistido em localStorage('mcsinc-lang').
    // ===========================================================================
    const STRINGS = {
      'pt-BR': {
        locale: 'pt-BR',

        // Section titles
        statusSection: 'Status',
        pendingSection: 'Pendentes',
        receivedSection: 'Recebidos',
        sentSection: 'Enviados',

        // Status card labels
        labelUser: 'Usuário',
        labelRoot: 'Pasta raiz',
        labelConnected: 'Ilhas conectadas',
        labelAvid: 'Avid',
        nobodyConnected: 'ninguém ainda',

        // Pendentes
        loading: 'carregando…',
        emptyPending: 'sem arquivos pendentes — siga editando.',
        messagePlaceholder: 'mensagem (opcional)',
        sendBtn: 'Enviar pasta',
        hashCalculating: 'calculando hash…',

        // Empty states dos cards
        emptyReceived: 'ninguém te enviou nada ainda.',
        emptySent: 'você ainda não enviou nada.',

        // Card commons
        filesToggle: 'arquivos',
        noFiles: 'nenhum arquivo',
        noMessage: 'sem mensagem',
        downloadBtn: 'Baixar',
        downloadingBtn: 'Baixando…',
        retryBtn: 'Tentar novamente',
        rejectBtn: 'Rejeitar',
        receiveAllBtn: 'Receber todos',
        rejectAllBtn: 'Rejeitar todos',
        clearHistoryBtn: 'Limpar histórico',
        confirmRejectAll: 'Rejeitar todos os commits aguardando?',
        confirmClearHistory: 'Apagar commits já baixados/rejeitados/falhos?',
        alertRejectFail: 'Falha ao rejeitar: ',
        rootEditBtn: 'Editar',
        rootSaveBtn: 'Salvar',
        rootCancelBtn: 'Cancelar',
        rootRestartWarn: 'Reinicie o MC Sinc para usar a nova pasta raiz.',
        alertRootSaveFail: 'Falha ao salvar pasta raiz: ',
        browseTitle: 'Escolher pasta Avid MediaFiles',
        browseSelectBtn: 'Selecionar esta pasta',
        browseCancelBtn: 'Cancelar',
        browseParent: '⬅ voltar',
        browseVolumeList: 'volumes / drives',
        browseHintRoot: 'Navegue até uma pasta chamada "Avid MediaFiles" e selecione-a.',
        browseStatusInvalid: 'Esta pasta não é uma Avid MediaFiles válida.',
        browseStatusReady: '✓ Avid MediaFiles válida — pode selecionar.',
        browseStatusListing: 'carregando…',

        // Pluralização. Recebe n; cada língua define a regra que quiser.
        fileCount: (n) => `${n} arquivo${n === 1 ? '' : 's'}`,

        // Mapeamento dos estados que vêm crus do backend
        commitStatus: {
          announced: 'aguardando',
          pulling: 'baixando',
          pulled: 'baixado',
          failed: 'falhou',
          rejected: 'rejeitado',
        },
        avidState: {
          busy: 'gravando',
          open_idle: 'aberto (ocioso)',
          recently_closed: 'fechou há pouco',
          idle: 'fechado',
          unknown: 'desconhecido',
        },
        avidLastMdb: (formatted) => `último .mdb: ${formatted}`,

        // Alerts
        alertSendFail: 'Falha ao enviar: ',
        alertPullFail: 'Falha ao baixar: ',
        alertError: 'Erro: ',

        // Connection badge (aparece quando o backend não responde)
        connectionError: 'desconectado',
        connectionRetryingIn: (s) => `tentando em ${s}s`,
      },
      // 'en-US': { ... } — adicionar aqui pra habilitar o seletor.
    };

    let currentLang = localStorage.getItem('mcsinc-lang') || 'pt-BR';
    if (!STRINGS[currentLang]) currentLang = 'pt-BR';
    let t = STRINGS[currentLang];

    function setLanguage(lang) {
      if (!STRINGS[lang]) return;
      currentLang = lang;
      localStorage.setItem('mcsinc-lang', lang);
      t = STRINGS[lang];
      document.documentElement.lang = lang;
      applyStaticStrings();
      refresh();
    }

    // Aplica strings nos elementos estáticos (títulos de seção, labels do
    // status, placeholder do input, texto do botão). Tudo que é re-renderizado
    // pelo refresh() pega t.foo no template diretamente.
    function applyStaticStrings() {
      document.getElementById('title-status').textContent = t.statusSection;
      document.getElementById('title-pending').textContent = t.pendingSection;
      document.getElementById('title-received').textContent = t.receivedSection;
      document.getElementById('title-sent').textContent = t.sentSection;

      document.getElementById('label-user').textContent = t.labelUser;
      document.getElementById('label-root').textContent = t.labelRoot;
      document.getElementById('label-connected').textContent = t.labelConnected;
      document.getElementById('label-avid').textContent = t.labelAvid;

      document.getElementById('message').placeholder = t.messagePlaceholder;
      document.getElementById('commit-btn').textContent = t.sendBtn;
      document.getElementById('receive-all-btn').textContent = t.receiveAllBtn;
      document.getElementById('reject-all-btn').textContent = t.rejectAllBtn;
      document.getElementById('clear-history-btn').textContent = t.clearHistoryBtn;
      document.getElementById('root-edit-btn').textContent = t.rootEditBtn;
      document.getElementById('restart-warn').textContent = t.rootRestartWarn;
      document.getElementById('browse-title').textContent = t.browseTitle;
      document.getElementById('browse-select').textContent = t.browseSelectBtn;
      document.getElementById('browse-cancel').textContent = t.browseCancelBtn;
      document.getElementById('browse-close').textContent = '×';
      // Botão Editar só aparece após primeiro refresh (precisa do root atual).
      document.getElementById('root-edit-btn').hidden = false;

      // Os <li class="empty"> e <div class="empty"> que começam vazios viram
      // "carregando…" até o primeiro refresh popular a lista de verdade.
      document.querySelectorAll('#pending .empty, #received .empty, #sent .empty')
        .forEach(el => { el.textContent = t.loading; });
    }

    // Seletor de idioma no header. Só aparece se há 2+ línguas registradas.
    function initLangSelect() {
      const langs = Object.keys(STRINGS);
      if (langs.length <= 1) return;
      const sel = document.getElementById('lang-select');
      sel.innerHTML = langs.map(l =>
        `<option value="${l}" ${l === currentLang ? 'selected' : ''}>${l}</option>`
      ).join('');
      sel.hidden = false;
      sel.addEventListener('change', () => setLanguage(sel.value));
    }

    // ===========================================================================
    // Estado local de UI
    // ===========================================================================

    // pullsInFlight rastreia ids cuja UI já mandou POST /pull mas o backend
    // ainda não atualizou o status no SQLite — evita botão Baixar voltar
    // por um tick antes do status virar "pulling".
    const pullsInFlight = new Set();

    // openDetails rastreia ids cujos <details> de "arquivos" estão expandidos.
    // Necessário porque refresh() reescreve innerHTML a cada 4s, e isso
    // destruiria o estado open=true. Reaplicado dentro de renderReceivedCard
    // e renderSentCard.
    const openDetails = new Set();

    // ===========================================================================
    // Helpers de formatação
    // ===========================================================================

    function fmtSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
      return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
    }

    function fmtTime(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleString(t.locale, { dateStyle: 'short', timeStyle: 'short' });
      } catch { return iso; }
    }

    function totalSize(files) {
      if (!files) return 0;
      return files.reduce((acc, f) => acc + (f.size || 0), 0);
    }

    function escapeHTML(s) {
      return (s || '').replace(/[&<>"']/g, ch => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[ch]));
    }

    function statusLabel(s) {
      return t.commitStatus[s] || s || '?';
    }

    function avidLabel(s) {
      return t.avidState[s] || s || '?';
    }

    // ===========================================================================
    // Render
    // ===========================================================================

    // renderPendingRow renderiza uma linha de Pendentes (sem checkbox — a
    // unidade de envio é a pasta inteira, não seleção parcial). Arquivos sem
    // hash mostram "calculando..." e ficam visualmente esmaecidos.
    function renderPendingRow(f) {
      const hasHash = !!f.Hash;
      const liClass = hasHash ? '' : 'no-hash';
      const note = hasHash ? '' : `<span class="hash-note">${escapeHTML(t.hashCalculating)}</span>`;
      return `<li class="${liClass}">
        <span class="path">${escapeHTML(f.Path)}</span>
        ${note}
        <span class="size">${fmtSize(f.Size)}</span>
      </li>`;
    }

    // updateCommitBtnState habilita "Enviar pasta" quando há pelo menos 1
    // arquivo com hash calculado (algo pra mandar). Backend tem o mesmo gate.
    function updateCommitBtnState(pending) {
      const btn = document.getElementById('commit-btn');
      const hasHashable = (pending || []).some(f => f.Hash);
      btn.disabled = !hasHashable;
    }

    // Mostra/esconde os botões de Receber/Rejeitar Todos + Limpar Histórico
    // baseado no que está disponível em Recebidos.
    function updateReceivedSectionActions(received) {
      const hasAction = received.some(c => c.status === 'announced' || c.status === 'failed');
      const hasFinished = received.some(c => c.status === 'pulled' || c.status === 'rejected' || c.status === 'failed');
      document.getElementById('receive-all-btn').hidden = !hasAction;
      document.getElementById('reject-all-btn').hidden = !hasAction;
      document.getElementById('clear-history-btn').hidden = !hasFinished;
    }

    function renderAvidBadge(av) {
      if (!av || !av.state) {
        return `<span class="badge unknown">${escapeHTML(t.avidState.unknown)}</span>`;
      }
      const lastMdb = av.last_mdb_change && av.last_mdb_change !== '0001-01-01T00:00:00Z'
        ? ` <span class="meta">· ${escapeHTML(t.avidLastMdb(fmtTime(av.last_mdb_change)))}</span>`
        : '';
      return `<span class="badge ${escapeHTML(av.state)}">${escapeHTML(avidLabel(av.state))}</span>${lastMdb}`;
    }

    function renderFilesList(files) {
      if (!files || files.length === 0) return `<li class="empty">${escapeHTML(t.noFiles)}</li>`;
      return files.map(f => `
        <li>
          <span>${escapeHTML(f.path)}</span>
          <span>${fmtSize(f.size)} · ${escapeHTML(f.hash)}</span>
        </li>
      `).join('');
    }

    function renderReceivedCard(c) {
      const uiStatus = pullsInFlight.has(c.id) && c.status === 'announced' ? 'pulling' : c.status;
      const canPull = uiStatus === 'announced' || uiStatus === 'failed';
      const canReject = uiStatus === 'announced' || uiStatus === 'failed';
      const btnLabel = uiStatus === 'failed' ? t.retryBtn : t.downloadBtn;
      const fileCount = (c.files || []).length;
      const messageHTML = c.message
        ? escapeHTML(c.message)
        : `<em class="empty">${escapeHTML(t.noMessage)}</em>`;

      const rejectBtnHTML = canReject
        ? `<button class="reject-btn" data-id="${escapeHTML(c.id)}">${escapeHTML(t.rejectBtn)}</button>`
        : '';

      return `
        <article class="commit-card" data-id="${escapeHTML(c.id)}">
          <header class="row">
            <div>
              <strong>@${escapeHTML(c.author)}</strong>
              <span class="meta"> · ${escapeHTML(c.id)}</span>
            </div>
            <span class="badge ${escapeHTML(uiStatus)}">${escapeHTML(statusLabel(uiStatus))}</span>
          </header>
          <div class="msg">${messageHTML}</div>
          <div class="summary">
            <span>${escapeHTML(t.fileCount(fileCount))} · ${fmtSize(totalSize(c.files))} · ${fmtTime(c.created_at)}</span>
            <span class="actions">
              <button class="pull-btn" data-id="${escapeHTML(c.id)}" ${canPull ? '' : 'disabled'}>${escapeHTML(btnLabel)}</button>
              ${rejectBtnHTML}
            </span>
          </div>
          <details${openDetails.has(c.id) ? ' open' : ''}>
            <summary>${escapeHTML(t.filesToggle)}</summary>
            <ul class="files">${renderFilesList(c.files)}</ul>
          </details>
        </article>
      `;
    }

    function renderSentCard(c) {
      const fileCount = (c.files || []).length;
      const messageHTML = c.message
        ? escapeHTML(c.message)
        : `<em class="empty">${escapeHTML(t.noMessage)}</em>`;
      return `
        <article class="commit-card sent" data-id="${escapeHTML(c.id)}">
          <header class="row">
            <div class="msg">${messageHTML}</div>
            <span class="meta">${fmtTime(c.created_at)}</span>
          </header>
          <details${openDetails.has(c.id) ? ' open' : ''}>
            <summary>${escapeHTML(t.fileCount(fileCount))} · ${fmtSize(totalSize(c.files))}</summary>
            <ul class="files">${renderFilesList(c.files)}</ul>
          </details>
        </article>
      `;
    }

    async function refresh() {
      try {
        const [status, pending, received, sent] = await Promise.all([
          fetch('/status').then(r => r.json()),
          fetch('/pending').then(r => r.json()),
          fetch('/commits/received').then(r => r.json()),
          fetch('/commits/sent').then(r => r.json()),
        ]);

        document.getElementById('version').textContent = 'v' + status.version;
        document.getElementById('user').textContent = status.user;
        document.getElementById('user-badge').textContent = '@' + status.user;
        document.getElementById('root').textContent = status.root;
        document.getElementById('peers').textContent =
          (status.peers && status.peers.length) ? status.peers.join(', ') : t.nobodyConnected;
        document.getElementById('avid').innerHTML = renderAvidBadge(status.avid);

        const pendingList = document.getElementById('pending');
        if (!pending || pending.length === 0) {
          pendingList.innerHTML = `<li class="empty">${escapeHTML(t.emptyPending)}</li>`;
        } else {
          pendingList.innerHTML = pending.map(f => renderPendingRow(f)).join('');
        }
        updateCommitBtnState(pending);

        // Limpa o pullsInFlight pra ids cujo status já saiu de 'announced'.
        if (received) {
          received.forEach(c => {
            if (c.status !== 'announced') pullsInFlight.delete(c.id);
          });
        }

        const receivedList = document.getElementById('received');
        if (!received || received.length === 0) {
          receivedList.innerHTML = `<div class="empty">${escapeHTML(t.emptyReceived)}</div>`;
        } else {
          receivedList.innerHTML = received.map(renderReceivedCard).join('');
        }
        // Mostra os botões em massa apenas se houver alvos: announceds
        // pra Receber/Rejeitar Todos; finalizados pra Limpar.
        updateReceivedSectionActions(received || []);

        const sentList = document.getElementById('sent');
        if (!sent || sent.length === 0) {
          sentList.innerHTML = `<div class="empty">${escapeHTML(t.emptySent)}</div>`;
        } else {
          sentList.innerHTML = sent.map(renderSentCard).join('');
        }
        // Sucesso completo — limpa qualquer indicador de erro pendente.
        onRefreshSuccess();
        return true;
      } catch (e) {
        console.error(e);
        onRefreshError();
        return false;
      }
    }

    // ===========================================================================
    // Scheduler do refresh com backoff em falha
    //
    // setInterval rígido (4s) escondia falhas: em rede instável a UI ficava com
    // dados velhos sem feedback ao usuário. Agora cada execução agenda a próxima
    // com setTimeout, e o intervalo dobra a cada falha consecutiva até 64s. O
    // badge "desconectado" aparece a partir da 2ª falha.
    // ===========================================================================
    const BASE_INTERVAL_MS = 4000;
    const MAX_BACKOFF_STEP = 4; // 4s * 2^4 = 64s teto
    let consecutiveFailures = 0;
    let nextRefreshTimer = null;

    function onRefreshSuccess() {
      consecutiveFailures = 0;
      hideConnectionBadge();
    }

    function onRefreshError() {
      consecutiveFailures += 1;
      if (consecutiveFailures >= 2) {
        showConnectionBadge();
      }
    }

    function nextIntervalMs() {
      const step = Math.min(consecutiveFailures, MAX_BACKOFF_STEP);
      return BASE_INTERVAL_MS * Math.pow(2, step === 0 ? 0 : step - 1);
    }

    function showConnectionBadge() {
      const badge = document.getElementById('connection-badge');
      const secs = Math.round(nextIntervalMs() / 1000);
      badge.textContent = `${t.connectionError} · ${t.connectionRetryingIn(secs)}`;
      badge.hidden = false;
    }

    function hideConnectionBadge() {
      document.getElementById('connection-badge').hidden = true;
    }

    function scheduleNext() {
      if (nextRefreshTimer) clearTimeout(nextRefreshTimer);
      nextRefreshTimer = setTimeout(runRefreshLoop, nextIntervalMs());
    }

    async function runRefreshLoop() {
      await refresh(); // refresh nunca rejeita; sinaliza erro via return false
      scheduleNext();
    }

    document.getElementById('commit-btn').addEventListener('click', async () => {
      // Mensagem é opcional — backend gera "envio manual em DD/MM/AAAA HH:MM"
      // se vier vazia.
      const msg = document.getElementById('message').value.trim();
      const r = await fetch('/commit', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ message: msg }),
      });
      if (!r.ok) { alert(t.alertSendFail + await r.text()); return; }
      document.getElementById('message').value = '';
      refresh();
    });

    // Mantém o Set openDetails em sincronia com o que o usuário abre/fecha.
    // 'toggle' não bubba — escuto em fase de captura nos containers.
    function trackToggles(container) {
      container.addEventListener('toggle', (ev) => {
        if (ev.target.tagName !== 'DETAILS') return;
        const card = ev.target.closest('.commit-card');
        if (!card || !card.dataset.id) return;
        if (ev.target.open) openDetails.add(card.dataset.id);
        else openDetails.delete(card.dataset.id);
      }, true);
    }
    trackToggles(document.getElementById('received'));
    trackToggles(document.getElementById('sent'));

    // Delegação de evento — cards são re-renderizados a cada 4s,
    // então não dá pra anexar listener por card direto. Trata pull e reject.
    document.getElementById('received').addEventListener('click', async (ev) => {
      // Rejeitar individual
      const rejectBtn = ev.target.closest('.reject-btn');
      if (rejectBtn) {
        const rid = rejectBtn.dataset.id;
        if (!rid) return;
        rejectBtn.disabled = true;
        try {
          const r = await fetch(`/commits/${encodeURIComponent(rid)}/reject`, { method: 'POST' });
          if (!r.ok) alert(t.alertRejectFail + await r.text());
        } catch (e) { alert(t.alertError + e.message); }
        refresh();
        return;
      }

      const btn = ev.target.closest('.pull-btn');
      if (!btn || btn.disabled) return;
      const id = btn.dataset.id;
      if (!id) return;

      btn.disabled = true;
      btn.textContent = t.downloadingBtn;
      pullsInFlight.add(id);
      try {
        const r = await fetch(`/commits/${encodeURIComponent(id)}/pull`, { method: 'POST' });
        if (!r.ok && r.status !== 202) {
          alert(t.alertPullFail + await r.text());
          pullsInFlight.delete(id);
        }
      } catch (e) {
        alert(t.alertError + e.message);
        pullsInFlight.delete(id);
      }
      refresh();
    });

    // "Receber todos" — itera DOM e clica em cada pull-btn habilitado.
    // Mais simples que iterar o JSON: aproveita o handler de click do
    // received que ja faz fetch + tracking de pullsInFlight.
    document.getElementById('receive-all-btn').addEventListener('click', () => {
      document.querySelectorAll('#received .pull-btn:not(:disabled)').forEach(b => b.click());
    });

    // "Rejeitar todos" — confirma e itera todos os reject-btn dos cards
    // ainda em announced/failed.
    document.getElementById('reject-all-btn').addEventListener('click', async () => {
      if (!confirm(t.confirmRejectAll)) return;
      const ids = Array.from(document.querySelectorAll('#received .reject-btn')).map(b => b.dataset.id);
      for (const id of ids) {
        try {
          await fetch(`/commits/${encodeURIComponent(id)}/reject`, { method: 'POST' });
        } catch (e) { /* segue rejeitando os outros */ }
      }
      refresh();
    });

    // "Limpar histórico" — apaga pulled/rejected/failed do manifest.
    document.getElementById('clear-history-btn').addEventListener('click', async () => {
      if (!confirm(t.confirmClearHistory)) return;
      try {
        const r = await fetch('/commits/clear', { method: 'POST' });
        if (!r.ok) alert(t.alertError + await r.text());
      } catch (e) { alert(t.alertError + e.message); }
      refresh();
    });

    // ===========================================================================
    // Modal de browse de pastas — UI navega volumes/diretórios via /fs/browse e
    // confirma seleção quando o usuário chegar numa pasta válida (nome
    // "Avid MediaFiles" + subpasta MXF presente). Após confirmar, POST
    // /config/select-avid persiste o root em config.json. Restart manual
    // ainda é necessário (PR seguinte fará reconfig dinâmico).
    // ===========================================================================
    let browseCurrentPath = '';

    function openBrowseModal() {
      document.getElementById('browse-modal').hidden = false;
      browseLoad(''); // começa nos volumes
    }
    function closeBrowseModal() {
      document.getElementById('browse-modal').hidden = true;
      browseCurrentPath = '';
    }

    async function browseLoad(path) {
      const statusEl = document.getElementById('browse-status');
      statusEl.className = 'browse-status';
      statusEl.textContent = t.browseStatusListing;
      try {
        const url = '/fs/browse' + (path ? '?path=' + encodeURIComponent(path) : '');
        const r = await fetch(url);
        if (!r.ok) {
          statusEl.className = 'browse-status error';
          statusEl.textContent = await r.text();
          return;
        }
        const data = await r.json();
        renderBrowseList(data);
      } catch (e) {
        statusEl.className = 'browse-status error';
        statusEl.textContent = e.message;
      }
    }

    function renderBrowseList(data) {
      browseCurrentPath = data.path || '';
      // Breadcrumb: mostra o path atual ou "volumes / drives" quando raiz.
      document.getElementById('browse-breadcrumb').textContent =
        data.is_volume_list ? t.browseVolumeList : (data.path || '');

      const listEl = document.getElementById('browse-list');
      const rows = [];
      if (data.parent) {
        rows.push(`<div class="item parent" data-action="up" data-path="${escapeHTML(data.parent)}">${escapeHTML(t.browseParent)} ${escapeHTML(data.parent)}</div>`);
      }
      if (!data.entries || data.entries.length === 0) {
        rows.push(`<div class="item parent">${escapeHTML(t.browseHintRoot)}</div>`);
      } else {
        for (const e of data.entries) {
          const cls = e.is_avid_media_files ? 'item avid' : 'item';
          const marker = e.is_avid_media_files ? '★ Avid MediaFiles' : '';
          rows.push(`<div class="${cls}" data-action="enter" data-path="${escapeHTML(e.path)}">
            <span class="name">${escapeHTML(e.name)}</span>
            <span class="marker">${marker}</span>
          </div>`);
        }
      }
      listEl.innerHTML = rows.join('');

      // Atualiza estado do botão "Selecionar": habilita só quando o
      // path ATUAL é uma Avid MediaFiles válida (nome correto + MXF).
      updateBrowseSelectState(data.path);
    }

    async function updateBrowseSelectState(path) {
      const btn = document.getElementById('browse-select');
      const statusEl = document.getElementById('browse-status');
      // Heurística rápida: nome do path precisa ser "Avid MediaFiles".
      // Validação completa (com MXF/) só acontece ao clicar Selecionar
      // — backend valida lá. Aqui só pré-filtramos.
      if (!path) {
        btn.disabled = true;
        statusEl.className = 'browse-status';
        statusEl.textContent = t.browseHintRoot;
        return;
      }
      const baseName = path.split(/[/\\]/).filter(Boolean).pop() || '';
      if (baseName !== 'Avid MediaFiles') {
        btn.disabled = true;
        statusEl.className = 'browse-status';
        statusEl.textContent = t.browseHintRoot;
        return;
      }
      btn.disabled = false;
      statusEl.className = 'browse-status ok';
      statusEl.textContent = t.browseStatusReady;
    }

    document.getElementById('root-edit-btn').addEventListener('click', openBrowseModal);
    document.getElementById('browse-cancel').addEventListener('click', closeBrowseModal);
    document.getElementById('browse-close').addEventListener('click', closeBrowseModal);

    document.getElementById('browse-list').addEventListener('click', (ev) => {
      const item = ev.target.closest('.item');
      if (!item || !item.dataset.path) return;
      browseLoad(item.dataset.path);
    });

    document.getElementById('browse-select').addEventListener('click', async () => {
      if (!browseCurrentPath) return;
      const statusEl = document.getElementById('browse-status');
      try {
        const r = await fetch('/config/select-avid', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ avid_media_files_path: browseCurrentPath }),
        });
        if (!r.ok) {
          statusEl.className = 'browse-status error';
          statusEl.textContent = await r.text();
          return;
        }
        closeBrowseModal();
        document.getElementById('restart-warn').hidden = false;
      } catch (e) {
        statusEl.className = 'browse-status error';
        statusEl.textContent = e.message;
      }
    });

    // Boot
    document.documentElement.lang = currentLang;
    applyStaticStrings();
    initLangSelect();
    runRefreshLoop();
  </script>
</body>
</html>
