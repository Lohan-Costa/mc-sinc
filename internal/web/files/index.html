<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MC Sinc</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #1a1d24;
      --border: #2a2e38;
      --text: #e6e8eb;
      --muted: #8b909c;
      --accent: #4ea1ff;
      --ok: #4ade80;
      --warn: #fbbf24;
      --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      padding: 1.5rem 2rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    header h1 { margin: 0; font-size: 1.4rem; }
    header h1 small { color: var(--muted); font-weight: normal; margin-left: .5rem; }
    main { max-width: 960px; margin: 0 auto; padding: 2rem; display: grid; gap: 1.5rem; }
    section.panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
    }
    section.panel h2 { margin-top: 0; font-size: 1rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
    .status-grid { display: grid; grid-template-columns: max-content 1fr; gap: .25rem 1rem; font-size: .95rem; }
    .status-grid dt { color: var(--muted); }
    ul.files { list-style: none; padding: 0; margin: 0; }
    ul.files li {
      padding: .6rem 0;
      border-bottom: 1px solid var(--border);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: .85rem;
      display: flex;
      justify-content: space-between;
      gap: 1rem;
    }
    ul.files li:last-child { border-bottom: none; }
    .empty { color: var(--muted); font-style: italic; }
    button {
      background: var(--accent); color: #fff; border: 0; padding: .5rem 1rem;
      border-radius: 6px; cursor: pointer; font-size: .9rem;
    }
    button:hover:not(:disabled) { filter: brightness(1.1); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    input[type=text] {
      background: var(--bg); color: var(--text); border: 1px solid var(--border);
      padding: .5rem .75rem; border-radius: 6px; flex: 1; font-size: .9rem;
    }
    .commit-form { display: flex; gap: .5rem; margin-top: 1rem; }

    /* Cards de commit (sent + received) */
    .commit-list { display: grid; gap: .75rem; }
    .commit-card {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .9rem 1rem;
      background: var(--bg);
    }
    .commit-card header.row {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 1rem; padding: 0; border: 0; margin-bottom: .35rem;
    }
    .commit-card .meta {
      color: var(--muted); font-size: .8rem;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
    .commit-card .msg { font-size: .95rem; margin: .15rem 0 .5rem; }
    .commit-card .summary {
      display: flex; justify-content: space-between; align-items: center;
      gap: 1rem; font-size: .85rem; color: var(--muted);
    }
    .commit-card .summary .actions { display: flex; gap: .5rem; align-items: center; }
    .commit-card .toggle {
      background: transparent; color: var(--accent); padding: 0;
      font-size: .85rem; text-decoration: underline; cursor: pointer;
    }
    .commit-card .toggle:hover { filter: brightness(1.2); }
    .commit-card details { margin-top: .5rem; }
    .commit-card details summary {
      color: var(--accent); cursor: pointer; font-size: .85rem;
      list-style: none; user-select: none;
    }
    .commit-card details summary::-webkit-details-marker { display: none; }
    .commit-card details summary::before { content: '▸ '; }
    .commit-card details[open] summary::before { content: '▾ '; }
    .commit-card details ul.files { margin-top: .4rem; }

    /* Badges de status */
    .badge {
      display: inline-block; padding: .15rem .55rem;
      border-radius: 999px; font-size: .72rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .badge.announced { background: #2a2e38; color: var(--muted); }
    .badge.pulling   { background: rgba(251,191,36,.15); color: var(--warn); }
    .badge.pulled    { background: rgba(74,222,128,.15); color: var(--ok); }
    .badge.failed    { background: rgba(248,113,113,.15); color: var(--danger); }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }
    .badge.pulling { animation: pulse 1.6s ease-in-out infinite; }

    /* Commits enviados ficam mais compactos */
    .commit-card.sent { padding: .65rem 1rem; }
    .commit-card.sent .msg { margin: 0; font-size: .9rem; }
  </style>
</head>
<body>
  <header>
    <h1>MC Sinc <small id="version"></small></h1>
    <span id="user-badge" class="empty"></span>
  </header>

  <main>
    <section class="panel">
      <h2>Status</h2>
      <dl class="status-grid">
        <dt>Usuário</dt><dd id="user">—</dd>
        <dt>Pasta raiz</dt><dd id="root">—</dd>
        <dt>Peers na LAN</dt><dd id="peers">—</dd>
      </dl>
    </section>

    <section class="panel">
      <h2>Pendentes</h2>
      <ul class="files" id="pending"><li class="empty">carregando…</li></ul>
      <div class="commit-form">
        <input type="text" id="message" placeholder="mensagem do commit (ex: scenes 12-14)" />
        <button id="commit-btn">Commit</button>
      </div>
    </section>

    <section class="panel">
      <h2>Commits recebidos</h2>
      <div class="commit-list" id="received"><div class="empty">carregando…</div></div>
    </section>

    <section class="panel">
      <h2>Commits enviados</h2>
      <div class="commit-list" id="sent"><div class="empty">carregando…</div></div>
    </section>
  </main>

  <script>
    // pullsInFlight rastreia ids cuja UI já mandou POST /pull mas o backend
    // ainda não atualizou o status no SQLite — evita botão Baixar voltar
    // por um tick antes do status virar "pulling".
    const pullsInFlight = new Set();

    // openDetails rastreia ids cujos <details> de "arquivos" estão expandidos.
    // Necessário porque refresh() reescreve innerHTML a cada 4s, e isso
    // destruiria o estado open=true. Reaplicado dentro de renderReceivedCard
    // e renderSentCard.
    const openDetails = new Set();

    function fmtSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + ' MB';
      return (bytes / 1024 / 1024 / 1024).toFixed(2) + ' GB';
    }

    function fmtTime(iso) {
      try {
        const d = new Date(iso);
        return d.toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });
      } catch { return iso; }
    }

    function totalSize(files) {
      if (!files) return 0;
      return files.reduce((acc, f) => acc + (f.size || 0), 0);
    }

    function escapeHTML(s) {
      return (s || '').replace(/[&<>"']/g, ch => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[ch]));
    }

    function statusLabel(s) {
      switch (s) {
        case 'announced': return 'aguardando';
        case 'pulling':   return 'baixando';
        case 'pulled':    return 'baixado';
        case 'failed':    return 'falhou';
        default:          return s || '?';
      }
    }

    function renderFilesList(files) {
      if (!files || files.length === 0) return '<li class="empty">nenhum arquivo</li>';
      return files.map(f => `
        <li>
          <span>${escapeHTML(f.path)}</span>
          <span>${fmtSize(f.size)} · ${escapeHTML(f.hash)}</span>
        </li>
      `).join('');
    }

    function renderReceivedCard(c) {
      const uiStatus = pullsInFlight.has(c.id) && c.status === 'announced' ? 'pulling' : c.status;
      const canPull = uiStatus === 'announced' || uiStatus === 'failed';
      const btnLabel = uiStatus === 'failed' ? 'Tentar novamente' : 'Baixar';
      const fileCount = (c.files || []).length;

      return `
        <article class="commit-card" data-id="${escapeHTML(c.id)}">
          <header class="row">
            <div>
              <strong>@${escapeHTML(c.author)}</strong>
              <span class="meta"> · ${escapeHTML(c.id)}</span>
            </div>
            <span class="badge ${escapeHTML(uiStatus)}">${escapeHTML(statusLabel(uiStatus))}</span>
          </header>
          <div class="msg">${escapeHTML(c.message) || '<em class="empty">sem mensagem</em>'}</div>
          <div class="summary">
            <span>${fileCount} arquivo${fileCount === 1 ? '' : 's'} · ${fmtSize(totalSize(c.files))} · ${fmtTime(c.created_at)}</span>
            <span class="actions">
              <button class="pull-btn" data-id="${escapeHTML(c.id)}" ${canPull ? '' : 'disabled'}>${btnLabel}</button>
            </span>
          </div>
          <details${openDetails.has(c.id) ? ' open' : ''}>
            <summary>arquivos</summary>
            <ul class="files">${renderFilesList(c.files)}</ul>
          </details>
        </article>
      `;
    }

    function renderSentCard(c) {
      const fileCount = (c.files || []).length;
      return `
        <article class="commit-card sent" data-id="${escapeHTML(c.id)}">
          <header class="row">
            <div class="msg">${escapeHTML(c.message) || '<em class="empty">sem mensagem</em>'}</div>
            <span class="meta">${fmtTime(c.created_at)}</span>
          </header>
          <details${openDetails.has(c.id) ? ' open' : ''}>
            <summary>${fileCount} arquivo${fileCount === 1 ? '' : 's'} · ${fmtSize(totalSize(c.files))}</summary>
            <ul class="files">${renderFilesList(c.files)}</ul>
          </details>
        </article>
      `;
    }

    async function refresh() {
      try {
        const [status, pending, received, sent] = await Promise.all([
          fetch('/status').then(r => r.json()),
          fetch('/pending').then(r => r.json()),
          fetch('/commits/received').then(r => r.json()),
          fetch('/commits/sent').then(r => r.json()),
        ]);

        document.getElementById('version').textContent = 'v' + status.version;
        document.getElementById('user').textContent = status.user;
        document.getElementById('user-badge').textContent = '@' + status.user;
        document.getElementById('root').textContent = status.root;
        document.getElementById('peers').textContent =
          (status.peers && status.peers.length) ? status.peers.join(', ') : 'nenhum ainda';

        const pendingList = document.getElementById('pending');
        if (!pending || pending.length === 0) {
          pendingList.innerHTML = '<li class="empty">sem arquivos pendentes — siga editando.</li>';
        } else {
          pendingList.innerHTML = pending.map(f =>
            `<li><span>${escapeHTML(f.Path)}</span><span>${fmtSize(f.Size)}</span></li>`
          ).join('');
        }

        // Limpa o pullsInFlight pra ids cujo status já saiu de 'announced'.
        if (received) {
          received.forEach(c => {
            if (c.status !== 'announced') pullsInFlight.delete(c.id);
          });
        }

        const receivedList = document.getElementById('received');
        if (!received || received.length === 0) {
          receivedList.innerHTML = '<div class="empty">nada chegou de peers ainda.</div>';
        } else {
          receivedList.innerHTML = received.map(renderReceivedCard).join('');
        }

        const sentList = document.getElementById('sent');
        if (!sent || sent.length === 0) {
          sentList.innerHTML = '<div class="empty">você ainda não fez commits.</div>';
        } else {
          sentList.innerHTML = sent.map(renderSentCard).join('');
        }
      } catch (e) {
        console.error(e);
      }
    }

    document.getElementById('commit-btn').addEventListener('click', async () => {
      const msg = document.getElementById('message').value.trim();
      if (!msg) { alert('Escreva uma mensagem antes de commitar.'); return; }
      const r = await fetch('/commit', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ message: msg }),
      });
      if (!r.ok) { alert('Falha no commit: ' + await r.text()); return; }
      document.getElementById('message').value = '';
      refresh();
    });

    // Mantém o Set openDetails em sincronia com o que o usuário abre/fecha.
    // 'toggle' não bubba — escuto em fase de captura nos containers.
    function trackToggles(container) {
      container.addEventListener('toggle', (ev) => {
        if (ev.target.tagName !== 'DETAILS') return;
        const card = ev.target.closest('.commit-card');
        if (!card || !card.dataset.id) return;
        if (ev.target.open) openDetails.add(card.dataset.id);
        else openDetails.delete(card.dataset.id);
      }, true);
    }
    trackToggles(document.getElementById('received'));
    trackToggles(document.getElementById('sent'));

    // Delegação de evento — cards são re-renderizados a cada 4s,
    // então não dá pra anexar listener por card direto.
    document.getElementById('received').addEventListener('click', async (ev) => {
      const btn = ev.target.closest('.pull-btn');
      if (!btn || btn.disabled) return;
      const id = btn.dataset.id;
      if (!id) return;

      btn.disabled = true;
      btn.textContent = 'Baixando…';
      pullsInFlight.add(id);
      try {
        const r = await fetch(`/commits/${encodeURIComponent(id)}/pull`, { method: 'POST' });
        if (!r.ok && r.status !== 202) {
          alert('Falha ao iniciar pull: ' + await r.text());
          pullsInFlight.delete(id);
        }
      } catch (e) {
        alert('Erro: ' + e.message);
        pullsInFlight.delete(id);
      }
      refresh();
    });

    refresh();
    setInterval(refresh, 4000);
  </script>
</body>
</html>
